name: Maintenir Supabase éveillé

# Le plan gratuit de Supabase met en pause les projets inactifs ~7 jours.
# Ce workflow fait une requête quotidienne pour maintenir le projet actif.
# Prérequis : définir les variables de repo SUPABASE_URL et SUPABASE_ANON_KEY
# (Settings → Secrets and variables → Actions → Variables).

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    if: vars.SUPABASE_URL != ''
    steps:
      - name: Requête de lecture sur l'API REST
        run: |
          curl -sf "${{ vars.SUPABASE_URL }}/rest/v1/disciplines?select=id&limit=1" \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}" \
            -o /dev/null
          echo "Supabase pingé avec succès"
